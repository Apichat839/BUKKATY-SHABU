<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="feedback-container">
        <div id="feedback-form">
            <h3>ให้คะแนนความพึงพอใจ</h3>
            
            <div class="rating">
                <input type="radio" id="star5" name="rating" value="5"><label for="star5">★</label>
                <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
                <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
                <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
                <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
            </div>

            <textarea id="comment" placeholder="เขียนรีวิวของคุณที่นี่..."></textarea>
            <button id="submit-btn">ส่งฟีดแบ็ก</button>
        </div>

        <div id="success-message" class="hidden">
            <div class="success-icon">✓</div>
            <h3>ส่งข้อมูลสำเร็จ!</h3>
            <p><b>ขอบคุณสำหรับความคิดเห็นของคุณ</b></p>
            <button class="reset-btn" onclick="resetForm()">ส่งใหม่อีกครั้ง</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
