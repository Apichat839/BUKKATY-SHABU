<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เมนูชาบู - Bukkaty Shabu</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Noto+Sans+Thai:wght@100..900&display=swap">
    
    <link rel="stylesheet" href="index.css"> 

    <style>
        /* --- โค้ด CSS เดิมของคุณ --- */
        body {
            background-color: #ffffff; 
            margin: 0;
            font-family: 'Noto Sans Thai', sans-serif;
        }

        .transparent-nav {
            background-color: #1a1a1a; 
            padding: 10px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logonav {
            height: 50px;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-menu a.active {
            color: #ff4d4d;
        }

        .nav-cart {
            color: white;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .menu-page {
            padding: 120px 20px 50px; 
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
        }

        .menu-tabs {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .tab-item {
            text-decoration: none;
            color: #ce363a;
            font-weight: bold;
            font-size: 1.2rem;
            position: relative;
        }

        .tab-item.active::after {
            content: "";
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #ce363a;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .menu-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s;
            cursor: pointer; /* เพิ่มเพื่อให้รู้ว่ากดได้ */
        }

        .menu-card:hover {
            transform: translateY(-5px);
        }

        .img-container {
            width: 100%;
            max-width: 220px;
            aspect-ratio: 1/1;
            border-radius: 50%;
            overflow: hidden;
            border: 6px solid #333;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .menu-card h3 {
            color: #333;
            font-size: 1.15rem;
            font-weight: bold;
            margin: 5px 0 0 0;
        }

        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr); 
            }
            .nav-menu {
                display: none; 
            }
        }

        /* --- ส่วนที่เพิ่มใหม่: CSS สำหรับ Modal เลือกจำนวน --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            position: relative;
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 25px;
            cursor: pointer;
            color: #888;
        }

        #modal-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ce363a;
            margin-bottom: 15px;
        }

        .qty-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }

        .btn-qty {
            background: #eee;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        #submit-btn {
            background: #ce363a;
            color: white;
            border: none;
            padding: 12px 0;
            width: 100%;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <nav class="transparent-nav">
        <div class="nav-container">
            <a href="index.html">
                <img src="imgs/11bkt.png" class="logonav" alt="Bukkaty Shabu Logo">
            </a>

            <div class="nav-menu">
                <a href="index.html">หน้าหลัก</a>
                <a href="shabu-menu.html" class="active">เมนูชาบูเติมความอร่อย</a> 
                <a href="Drinks-menu.html">เมนูเติมความสดชื่น</a>
                <a href="#">เมนูเติมความอร่อยกลับบ้าน</a>
            </div>

            <div class="nav-cart">
                <i class="fas fa-search"></i>
                <div style="position: relative; cursor: pointer;">
                    <i class="fas fa-shopping-basket"></i>
                    <span id="cart-count" style="position: absolute; top: -10px; right: -10px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px;">0</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="menu-page">
        <div id="order-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="close-modal">&times;</span>
                <img src="" id="modal-img" alt="รูปเมนู">
                <h2 id="modal-title">ชื่อเมนู</h2>
                <p id="modal-price-display">ราคา 0 บาท</p>
                
                <div class="qty-control">
                    <button class="btn-qty" id="minus-qty">-</button>
                    <span id="current-qty" style="font-size: 1.5rem; font-weight: bold;">1</span>
                    <button class="btn-qty" id="plus-qty">+</button>
                </div>

                <button id="submit-btn">เพิ่มลงตะกร้า</button>
            </div>
        </div>

        <div class="menu-tabs">
            <a href="#" class="tab-item active">น้ำซุป</a>
        </div>

        <div class="menu-grid">
            <div class="menu-card">
                <div class="img-container"><img src="imgs/l1.jpg" alt="น้ำซุปหม่าล่า"></div>
                <h3>น้ำซุปหม่าล่า</h3>
            </div>
            <div class="menu-card">
                <div class="img-container"><img src="imgs/dd1.jpg" alt="ซุปน้ำดำ"></div>
                <h3>ซุปน้ำดำ</h3>
            </div>
            <div class="menu-card">
                <div class="img-container"><img src="imgs/ss1.jpg" alt="ซุปน้ำใส"></div>
                <h3>ซุปน้ำใส</h3>
            </div>
            <div class="menu-card">
                <div class="img-container"><img src="imgs/ks1.jpg" alt="ซุปมิโซะทงคตซึ"></div>
                <h3>ซุปมิโซะทงคตซึ</h3>
            </div>
        </div>

        <section class="shabu-section" style="margin-top: 50px;">
            <div class="menu-tabs">
                <a href="#" class="tab-item active">เมนูชาบู</a>
            </div>
            <div class="menu-grid">
                <div class="menu-card">
                    <div class="img-container"><img src="imgs/wk1.jpg" alt="เนื้อวากิว"></div>
                    <h3>เนื้อวากิว</h3>
                    <h4> 59 บาท.</h4>
                </div>
                <div class="menu-card">
                    <div class="img-container"><img src="imgs/pp1.jfif" alt="หมูสไลด์"></div>
                    <h3>เนื้อหมูหมูสไลด์</h3>
                    <h4> 59 บาท.</h4>
                </div>
                <div class="menu-card">
                    <div class="img-container"><img src="imgs/smm1.jfif" alt="แซลมอน"></div>
                    <h3>ปลาแซลมอน</h3>
                    <h4> 59 บาท.</h4>
                </div>
                <div class="menu-card">
                    <div class="img-container"><img src="imgs/sg1.jfif" alt="กุ้งสด"></div>
                    <h3>กุ้งสดแม่น้ำ</h3>
                    <h4> 59 บาท.</h4>
                </div>
            </div>
        </section>

        <script>
    // --- ระบบ Modal และ ตะกร้าสินค้า ---
    const modal = document.getElementById('order-modal');
    const modalImg = document.getElementById('modal-img');
    const modalTitle = document.getElementById('modal-title');
    const modalPriceDisp = document.getElementById('modal-price-display');
    const qtyText = document.getElementById('current-qty');
    const cartCount = document.getElementById('cart-count');

    // แก้ไข: ดึงค่าจาก localStorage ถ้าไม่มีให้เริ่มที่ 0
    let totalInCart = parseInt(localStorage.getItem('cartCount')) || 0;
    cartCount.innerText = totalInCart; // แสดงค่าที่จำไว้ทันทีเมื่อโหลดหน้า

    // เปิด Modal เมื่อคลิกการ์ดเมนู
    document.querySelectorAll('.menu-card').forEach(card => {
        card.addEventListener('click', () => {
            const title = card.querySelector('h3').innerText;
            const img = card.querySelector('img').src;
            const priceTag = card.querySelector('h4');
            const price = priceTag ? priceTag.innerText : "0 บาท.";

            modalTitle.innerText = title;
            modalImg.src = img;
            modalPriceDisp.innerText = "ราคา " + price;
            qtyText.innerText = 1;
            modal.style.display = 'flex';
        });
    });

    // ปิด Modal
    document.getElementById('close-modal').onclick = () => modal.style.display = 'none';
    window.onclick = (event) => { if (event.target == modal) modal.style.display = 'none'; };

    // เพิ่ม-ลดจำนวน
    document.getElementById('plus-qty').onclick = () => {
        qtyText.innerText = parseInt(qtyText.innerText) + 1;
    };
    document.getElementById('minus-qty').onclick = () => {
        let current = parseInt(qtyText.innerText);
        if (current > 1) qtyText.innerText = current - 1;
    };

    // ยืนยันเพิ่มลงตะกร้า
    document.getElementById('submit-btn').onclick = () => {
        totalInCart += parseInt(qtyText.innerText);
        cartCount.innerText = totalInCart;
        
        // แก้ไข: บันทึกค่าลงใน localStorage
        localStorage.setItem('cartCount', totalInCart);
        
        alert(`เพิ่ม ${modalTitle.innerText} ลงตะกร้าเรียบร้อยแล้ว!`);
        modal.style.display = 'none';
    };

    // --- ระบบ Scroll เปลี่ยนหน้า ---
    let isRedirecting = false;
    window.addEventListener('scroll', function() {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 10) {
            if (!isRedirecting) {
                isRedirecting = true;
                window.location.href = "Drinks-menu.html"; 
            }
        }
    });
    </script>
    </main>
</body>
</html>
