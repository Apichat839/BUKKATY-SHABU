<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUKKATY SHABU - Bill</title>
    <link rel="stylesheet" href="bill.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bill">
        <header class="bill-header">
            <h1 class="namebrand">BUKKATY</h1>
            <p class="subname">SHABU & PREMIEM</p>
        </header>
    

        <div id="order-item" class="order">
        </div>

        <footer class="bill-footer">
            <div class="total">
                <span>ยอดชำระสุทธิ</span>
                <span id="total-amount">0.-</span>
            </div>

            <button class="pay" onclick="generateQR()">
                แสกน QR เพื่อจ่ายเงิน
            </button>
        </footer>
    </div>
    <div id="qr" class="qr">
        <div class="qr1">
            <h3>ชำระเงินผ่าน PromptPay</h3>
            <p>ยอดชำระ: <span id="price"></span> บาท</p>
            <div id="qr-image-container">
                <img id="qr-img" alt="PromptPay QR">
            </div>
            <button class="close" onclick="closeModal()">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script src="bill.js"></script>
</body>
</html>
